apiVersion: apps/v1
kind: Deployment

metadata:
  name: planespotter

spec:
  selector:
    matchLabels:
      app: planespotter

  replicas: 1
  template:
    metadata:
      labels:
        app: planespotter

    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data

      containers:
        - name: planespotter
          image: ghcr.io/nint8835/planespotter

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
          
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: http

          env:
            - name: PLANESPOTTER_SEEN_AIRCRAFT_PATH
              value: /data/seen.json
            - name: PLANESPOTTER_DATA_PATH
              value: /data
            - name: PLANESPOTTER_TAR1090_URL
              value: http://ares.internal.bootleg.technology:1090

          envFrom:
            - secretRef:
                name: secrets
              prefix: PLANESPOTTER_
          
          volumeMounts:
            - mountPath: /data
              name: data

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
    
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
