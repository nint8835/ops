apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy

metadata:
  name: skyline
  namespace: flux-system

spec:
  imageRepositoryRef:
    name: skyline
  filterTags:
    pattern: '^main-[[:xdigit:]]{7,}-(?P<ts>\d{8}-\d{6})$'
    extract: '$ts'
  policy:
    alphabetical:
      order: asc
  digestReflectionPolicy: IfNotPresent
