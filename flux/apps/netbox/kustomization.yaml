apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: netbox

resources:
  - namespace.yaml
  - postgres.yaml
  - persistent_volume_claim.yaml
  - redis.yaml
  - service_redis.yaml
  - config.yaml
  - secrets.yaml
  - netbox.yaml
  - service_netbox.yaml
  - netbox_worker.yaml
  - ingress.yaml

configMapGenerator:
  - name: config-dir
    files:
      - config/configuration.py
      - config/extra.py
      - config/logging.py
      - config/plugins.py

images:
  - name: ghcr.io/netbox-community/netbox
    newTag: v4.6.5@sha256:980b4cba2c53bf806762b890e0d683eb23413330aa1f94f0c06f0cad31603f39
  - name: ghcr.io/valkey-io/valkey
    newTag: 9.1.0-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
